version: "3.8"

services:
  harness:
    image: harness/harness
    container_name: harness
    restart: always
    ports:
      - "3000:3000"
      - "3022:3022"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - harness_data:/data

  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: harness-agent
    restart: always
    ports:
      - "3001:3001"
      - "3002:3002"
    environment:
      - HARNESS_BASE_URL=http://harness:3000
      - HARNESS_TOKEN=${HARNESS_TOKEN}
      - HARNESS_SPACE=${HARNESS_SPACE:-test}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.deepseek.com}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
    depends_on:
      - harness

volumes:
  harness_data:
